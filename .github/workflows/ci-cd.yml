name: CI/CD

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test --no-build --configuration Release

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    env:
      IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.GCP_ARTIFACT_REPO }}/routineflow:${{ github.sha }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOY_SA_EMAIL }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker "${{ secrets.GCP_REGION }}-docker.pkg.dev" --quiet

      - name: Build and push image
        run: |
          docker build -t "$IMAGE" .
          docker push "$IMAGE"

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Run database migrations
        run: |
          dotnet tool install --global dotnet-ef --version 8.*
          CONN=$(gcloud secrets versions access latest --secret=db-connection-string)
          dotnet ef database update --project RoutineFlow.csproj --connection "$CONN"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy routineflow \
            --image="$IMAGE" \
            --region="${{ secrets.GCP_REGION }}" \
            --service-account="${{ secrets.GCP_RUNTIME_SA_EMAIL }}" \
            --set-secrets="ConnectionStrings__Default=db-connection-string:latest,Jwt__SigningKey=jwt-signing-key:latest" \
            --port=8080 \
            --allow-unauthenticated \
            --quiet
